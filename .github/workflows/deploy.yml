name: Deploy Astro site to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build CV (EN) PDF
        uses: xu-cheng/latex-action@v3
        with:
          working_directory: cv_src/overleaf_en
          root_file: main.tex
          args: -interaction=nonstopmode -file-line-error

      - name: Build CV (ZH) PDF
        uses: xu-cheng/latex-action@v3
        with:
          working_directory: cv_src/overleaf_zh/resume
          root_file: resume-zh_CN.tex
          latexmk_use_xelatex: true
          args: -interaction=nonstopmode -file-line-error

      - name: Debug LaTeX logs (always)
        if: always()
        run: |
          echo "=== EN files ==="
          ls -la cv_src/overleaf_en || true
          echo "=== EN log tail ==="
          test -f cv_src/overleaf_en/main.log && tail -n 200 cv_src/overleaf_en/main.log || true
          echo "=== ZH files ==="
          ls -la cv_src/overleaf_zh/resume || true
          echo "=== ZH log tail ==="
          test -f cv_src/overleaf_zh/resume/resume-zh_CN.log && tail -n 200 cv_src/overleaf_zh/resume/resume-zh_CN.log || true

      - name: Place CV PDFs
        run: |
          mkdir -p public/files
          cp cv_src/overleaf_en/main.pdf public/files/CV_EN.pdf
          cp cv_src/overleaf_zh/resume/resume-zh_CN.pdf public/files/CV_ZH.pdf

      - name: Install
        run: npm install --no-audit --no-fund

      - name: Build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
